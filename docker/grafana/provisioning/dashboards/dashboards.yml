# =============================================================================
# GRAFANA DASHBOARDS PROVISIONING
# Automatically loads dashboards for Trendzo monitoring
# =============================================================================

apiVersion: 1

providers:
  # Main dashboards provider
  - name: 'trendzo-dashboards'
    orgId: 1
    folder: 'Trendzo'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      
  # System dashboards provider  
  - name: 'system-dashboards'
    orgId: 1
    folder: 'System'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 60
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/system
      
  # Business dashboards provider
  - name: 'business-dashboards'
    orgId: 1
    folder: 'Business Metrics'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 120
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/business