# =============================================================================
# DOCKER SECURITY CONFIGURATION
# Production security hardening for Docker deployment
# =============================================================================

# =============================================================================
# DOCKER DAEMON SECURITY SETTINGS
# Apply these settings to /etc/docker/daemon.json
# =============================================================================

{
  "log-driver": "json-file",
  "log-opts": {
    "max-size": "10m",
    "max-file": "3"
  },
  "live-restore": true,
  "userland-proxy": false,
  "no-new-privileges": true,
  "seccomp-profile": "/etc/docker/seccomp/default.json",
  "default-ulimits": {
    "nofile": {
      "hard": 64000,
      "soft": 64000
    }
  },
  "storage-driver": "overlay2",
  "storage-opts": [
    "overlay2.override_kernel_check=true"
  ],
  "experimental": false,
  "metrics-addr": "127.0.0.1:9323",
  "features": {
    "buildkit": true
  },
  "default-address-pools": [
    {
      "base": "172.17.0.0/12",
      "size": 24
    }
  ],
  "dns": ["8.8.8.8", "8.8.4.4"],
  "insecure-registries": [],
  "registry-mirrors": [],
  "hosts": [
    "unix:///var/run/docker.sock"
  ]
}

# =============================================================================
# DOCKER COMPOSE SECURITY OVERRIDES
# Add to production docker-compose files
# =============================================================================

# Security context for all services:
#   security_opt:
#     - no-new-privileges:true
#   read_only: true
#   user: "1001:1001"
#   cap_drop:
#     - ALL
#   cap_add:
#     - NET_BIND_SERVICE  # Only if needed for port 80/443

# Volume mounts should be read-only where possible:
#   volumes:
#     - ./config:/app/config:ro

# Limit resources:
#   deploy:
#     resources:
#       limits:
#         memory: 2G
#         cpus: '1.0'
#       reservations:
#         memory: 1G
#         cpus: '0.5'

# =============================================================================
# CONTAINER RUNTIME SECURITY
# =============================================================================

# Run containers with restricted privileges
# Never run containers as root user
# Use read-only root filesystem where possible
# Drop all capabilities and add only what's needed
# Use specific user IDs instead of usernames
# Disable privilege escalation
# Use security profiles (AppArmor/SELinux)
# Scan images for vulnerabilities regularly
# Use minimal base images (Alpine, Distroless)
# Multi-stage builds to reduce attack surface