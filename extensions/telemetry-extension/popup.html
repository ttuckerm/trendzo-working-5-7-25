<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ViralLab Telemetry</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 12px; width: 360px; }
      label { display:block; margin-top:8px; font-size:12px; color:#333 }
      input { width:100%; box-sizing:border-box; padding:6px; }
      .row { display:flex; gap:8px; }
      .row > div { flex:1; }
      button { margin-top:10px; padding:8px 12px; }
      .toast { margin-top:10px; font-size:12px; }
    </style>
  </head>
  <body>
    <h3>Telemetry Sender</h3>
    <label>API URL
      <input id="apiUrl" placeholder="http://localhost:3000/api/telemetry/first_hour_plugin" />
    </label>
    <label>API Key
      <input id="apiKey" placeholder="TK_TLM_..." />
    </label>
    <label>Video ID
      <input id="videoId" placeholder="ext_mock_1" />
    </label>
    <label>Timestamp (ISO)
      <input id="tsIso" />
    </label>
    <div class="row">
      <div><label>Views<input id="views" type="number" value="1700" /></label></div>
      <div><label>Unique<input id="uniqueViewers" type="number" value="1600" /></label></div>
    </div>
    <div class="row">
      <div><label>Avg Watch %<input id="avgWatchPct" type="number" step="0.01" value="0.42" /></label></div>
      <div><label>Completion<input id="completionRate" type="number" step="0.01" value="0.21" /></label></div>
    </div>
    <div class="row">
      <div><label>Rewatches<input id="rewatches" type="number" value="20" /></label></div>
      <div><label>Shares<input id="shares" type="number" value="12" /></label></div>
    </div>
    <div class="row">
      <div><label>Saves<input id="saves" type="number" value="8" /></label></div>
      <div><label>Comments<input id="comments" type="number" value="5" /></label></div>
    </div>
    <label>Source
      <input id="source" value="extension" />
    </label>
    <button id="save">Save Settings</button>
    <button id="send">Send</button>
    <div id="toast" class="toast"></div>
    <script src="popup.js"></script>
  </body>
  </html>
