<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral Recipe Book™</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
            cursor: none;
        }

        /* Custom cursor */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, rgba(123, 97, 255, 0.8) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
            mix-blend-mode: screen;
        }

        .cursor.hover {
            transform: translate(-50%, -50%) scale(2);
            background: radial-gradient(circle, rgba(255, 97, 166, 0.8) 0%, transparent 70%);
        }

        /* Background ambient */
        .ambient-bg {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(123, 97, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(255, 97, 166, 0.05) 0%, transparent 50%);
            animation: ambient-shift 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes ambient-shift {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(180deg); }
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, #000 0%, transparent 100%);
            padding: 24px 40px 80px;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #7b61ff 0%, #ff61a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: logo-pulse 3s ease-in-out infinite;
        }

        @keyframes logo-pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* Search (hidden but functional) */
        .search-container {
            position: absolute;
            top: -9999px;
            left: -9999px;
        }

        .search-input {
            opacity: 0;
            pointer-events: none;
        }

        /* View toggle */
        .view-toggle {
            display: none;
        }

        /* Stats badge */
        .trending-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            font-size: 14px;
            animation: badge-glow 2s ease-in-out infinite;
        }

        @keyframes badge-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(123, 97, 255, 0.3); }
            50% { box-shadow: 0 0 30px rgba(255, 97, 166, 0.4); }
        }

        .live-indicator {
            width: 8px;
            height: 8px;
            background: #ff4458;
            border-radius: 50%;
            animation: live-pulse 1s ease-out infinite;
        }

        @keyframes live-pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* Filters */
        .filters-bar {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
        }

        .filter-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            outline: none;
        }

        .filter-btn:hover {
            background: rgba(123, 97, 255, 0.2);
            border-color: rgba(123, 97, 255, 0.4);
            color: #fff;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #7b61ff 0%, #ff61a6 100%);
            color: #fff;
        }

        /* Template feed */
        .template-feed {
            padding: 200px 40px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .feed-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 32px;
            animation: feed-load 0.8s ease-out;
        }

        @keyframes feed-load {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Template card */
        .template-card {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            transform-style: preserve-3d;
            animation: card-appear 0.6s ease-out backwards;
        }

        .template-card:nth-child(1) { animation-delay: 0.1s; }
        .template-card:nth-child(2) { animation-delay: 0.2s; }
        .template-card:nth-child(3) { animation-delay: 0.3s; }
        .template-card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes card-appear {
            from {
                opacity: 0;
                transform: translateY(30px) rotateX(-10deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0);
            }
        }

        .template-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(123, 97, 255, 0.1) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .template-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(123, 97, 255, 0.3);
            box-shadow: 
                0 20px 40px rgba(123, 97, 255, 0.3),
                0 0 80px rgba(123, 97, 255, 0.2);
        }

        .template-card:hover::before {
            opacity: 1;
        }

        /* State badge */
        .state-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .state-hot {
            background: linear-gradient(135deg, rgba(255, 68, 88, 0.9) 0%, rgba(255, 107, 107, 0.9) 100%);
        }

        .state-cooling {
            background: linear-gradient(135deg, rgba(78, 205, 196, 0.9) 0%, rgba(68, 163, 170, 0.9) 100%);
        }

        .state-new {
            background: linear-gradient(135deg, rgba(123, 97, 255, 0.9) 0%, rgba(255, 97, 166, 0.9) 100%);
        }

        /* Video preview */
        .video-preview {
            position: relative;
            width: 100%;
            height: 400px;
            overflow: hidden;
        }

        .video-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            color: white;
            text-align: center;
            padding: 20px;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .template-card:hover .video-placeholder {
            transform: scale(1.1);
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            opacity: 1;
            transition: opacity 0.3s;
        }

        .template-card:hover .play-overlay {
            opacity: 0;
        }

        .play-button {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            transition: all 0.3s;
        }

        /* Viral DNA indicator */
        .viral-dna {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .dna-dot {
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, #7b61ff 0%, #ff61a6 100%);
            border-radius: 50%;
            animation: dna-pulse 2s ease-in-out infinite;
            animation-delay: calc(var(--i) * 0.2s);
        }

        @keyframes dna-pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.5); opacity: 1; }
        }

        /* Viral rule */
        .viral-rule {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 4px 8px;
            background: rgba(123, 97, 255, 0.2);
            border: 1px solid rgba(123, 97, 255, 0.3);
            border-radius: 100px;
            font-size: 10px;
            font-family: monospace;
            color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }

        /* Template info */
        .template-info {
            padding: 24px;
        }

        .template-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .stat-icon {
            font-size: 18px;
        }

        .stat-number {
            font-weight: 600;
            background: linear-gradient(135deg, #7b61ff 0%, #ff61a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .template-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            transition: color 0.3s;
        }

        .template-description {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.5;
            margin-bottom: 16px;
        }

        /* Meta row */
        .meta-row {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .meta-item strong {
            color: #fff;
        }

        /* Platform & Duration */
        .platform-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        /* Platform indicator */
        .platform-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .platform-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            min-width: 80px;
        }

        .platform-bar-container {
            position: relative;
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: visible;
        }

        .platform-bar {
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s ease-out;
            position: relative;
        }

        .platform-bar.youtube {
            background: linear-gradient(90deg, #4ade80 0%, #22c55e 100%);
            width: 91%;
        }

        .platform-bar.tiktok {
            background: linear-gradient(90deg, #4ade80 0%, #22c55e 100%);
            width: 89%;
        }

        .platform-bar.instagram {
            background: linear-gradient(90deg, #4ade80 0%, #22c55e 100%);
            width: 84%;
        }

        .platform-bar.all {
            background: linear-gradient(90deg, #4ade80 0%, #22c55e 100%);
            width: 84%;
        }

        .platform-value {
            font-size: 13px;
            color: #fff;
            font-weight: 600;
            min-width: 40px;
            text-align: right;
        }

        /* Platform arrows */
        .platform-arrows {
            position: absolute;
            left: calc(100% + 10px);
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 4px;
        }

        .platform-arrow {
            width: 0;
            height: 0;
            border-left: 8px solid #4ade80;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            animation: arrow-pulse 1.5s ease-in-out infinite;
        }

        .platform-arrow:nth-child(2) {
            animation-delay: 0.3s;
        }

        @keyframes arrow-pulse {
            0%, 100% { opacity: 0.4; transform: translateX(0); }
            50% { opacity: 1; transform: translateX(4px); }
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .view-details-btn {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .view-details-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .copy-winner-btn {
            flex: 1;
            padding: 12px 16px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .copy-winner-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        /* Signal badges */
        .signal-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
        }

        .signal-badge {
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Quality row */
        .quality-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 12px;
        }

        .quality-check {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .quality-check.pass {
            color: #4ade80;
        }

        .quality-check.warn {
            color: #fbbf24;
        }

        /* Trending sound */
        .trending-sound {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: rgba(123, 97, 255, 0.1);
            border: 1px solid rgba(123, 97, 255, 0.2);
            border-radius: 100px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .trending-sound:hover {
            background: rgba(123, 97, 255, 0.2);
            border-color: rgba(123, 97, 255, 0.4);
        }

        .sound-icon {
            font-size: 16px;
            animation: sound-wave 1s ease-in-out infinite;
        }

        @keyframes sound-wave {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Use template button */
        .use-template {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #7b61ff 0%, #ff61a6 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0;
            transform: translateY(10px);
        }

        .template-card:hover .use-template {
            opacity: 1;
            transform: translateY(0);
        }

        .use-template:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(123, 97, 255, 0.4);
        }

        /* Floating elements */
        .floating-orb {
            position: fixed;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(123, 97, 255, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: float-orb 20s ease-in-out infinite;
        }

        .floating-orb:nth-child(2) {
            left: 80%;
            top: 60%;
            background: radial-gradient(circle, rgba(255, 97, 166, 0.2) 0%, transparent 70%);
            animation-duration: 25s;
            animation-delay: -5s;
        }

        @keyframes float-orb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.2); }
            66% { transform: translate(-30px, 30px) scale(0.8); }
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .feed-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }

            .header {
                padding: 16px 20px 60px;
            }

            .template-feed {
                padding: 160px 20px 20px;
            }
        }
    </style>
</head>

    <!-- Template feed -->
    <main class="template-feed">

                sound: 'Monkeys Spinning - Kevin MacLeod',
                gradient: 'linear-gradient(135deg, #4ecdc4 0%, #ff6b6b 100%)'
            }
        ];

        // Render templates
        function renderTemplates() {
            const feedGrid = document.getElementById('feedGrid');
            feedGrid.innerHTML = templates.map(template => `
                <article class="template-card" data-id="${template.id}">
                    <div class="state-badge state-${template.state.toLowerCase()}">${template.state}</div>
                    
                    <div class="viral-dna">
                        <div class="dna-dot" style="--i: 0"></div>
                        <div class="dna-dot" style="--i: 1"></div>
                        <div class="dna-dot" style="--i: 2"></div>
                    </div>
                    
                    <div class="viral-rule" title="Viral criteria">z≥2 & pct≥95 (48h)</div>
                    
                    <div class="video-preview">
                        <div class="video-placeholder" style="background: ${template.gradient};">
                            ${template.title.split(' ').slice(0, 2).join(' ')}
                        </div>
                        <div class="play-overlay">
                            <div class="play-button">▶️</div>
                        </div>
                    </div>
                    
                    <div class="template-info">
                        <div class="template-stats">
                            <div class="stat">
                                <span class="stat-icon">👁️</span>
                                <span class="stat-number">${template.views}</span>
                            </div>
                            <div class="stat">
                                <span class="stat-icon">❤️</span>
                                <span class="stat-number">${template.likes}</span>
                            </div>
                            <div class="stat">
                                <span class="stat-icon">🔥</span>
                                <span class="stat-number">${template.viralScore}</span>
                            </div>
                        </div>
                        
                        <h3 class="template-title">${template.title}</h3>
                        <p class="template-description">${template.description}</p>
                        
                        <div class="meta-row">
                            <div class="meta-item">SR: <strong style="color: ${template.sr >= 90 ? '#4ade80' : template.sr >= 80 ? '#fbbf24' : '#f87171'};">${template.sr}%</strong></div>
                            <div class="meta-item">Uses: <strong>${template.uses.toLocaleString()}</strong></div>
                            <div class="meta-item">Examples: <strong>${template.examples}</strong></div>
                        </div>
                        
                        <div class="meta-row">
                            <div class="meta-item">${template.lastSeen}</div>
                        </div>
                        
                        <div class="platform-indicator">
                            <span class="platform-label">${template.platformName}:</span>
                            <div class="platform-bar-container">
                                <div class="platform-bar ${template.platformName.toLowerCase()}">
                                    <div class="platform-arrows">
                                        <div class="platform-arrow"></div>
                                        <div class="platform-arrow"></div>
                                    </div>
                                </div>
                            </div>
                            <span class="platform-value">${template.sr}%</span>
                        </div>
                        
                        <div class="platform-row">
                            <span>${template.platforms.join(' ')}</span>
                            <span>${template.duration}</span>
                            <span>Hook: ${template.hookTime}</span>
                        </div>
                        
                        <div class="signal-badges">
                            ${template.signals.map(s => `<span class="signal-badge">${s}</span>`).join('')}
                        </div>
                        
                        <div class="quality-row">
                            <div class="quality-check ${template.brandSafe ? 'pass' : 'warn'}">
                                ${template.brandSafe ? '✓' : '⚠'} Brand-safe
                            </div>
                            <div class="quality-check ${template.antiGaming ? 'pass' : 'warn'}">
                                ${template.antiGaming ? '✓' : '⚠'} Anti-gaming
                            </div>
                            <div class="quality-check pass">
                                ${template.reliability}
                            </div>
                        </div>
                        
                        <div class="trending-sound">
                            <span class="sound-icon">🎵</span>
                            <span>Trending: "${template.sound}"</span>
                        </div>
                        
                        <div class="action-buttons">
                            <button class="view-details-btn">
                                👁️ View Details
                            </button>
                            <button class="copy-winner-btn">
                                📋 Copy Winner
                            </button>
                        </div>
                        
                        <button class="use-template">Create with this template ✨</button>
                    </div>
                </article>
            `).join('');
        }

        // Initialize cursor
        const cursor = document.getElementById('cursor');
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            const dx = mouseX - cursorX;
            const dy = mouseY - cursorY;
            
            cursorX += dx * 0.1;
            cursorY += dy * 0.1;
            
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // Cursor hover effects
        document.addEventListener('mouseover', (e) => {
            if (e.target.closest('.template-card, button, .trending-sound, .filter-btn')) {
                cursor.classList.add('hover');
            }
        });

        document.addEventListener('mouseout', (e) => {
            if (e.target.closest('.template-card, button, .trending-sound, .filter-btn')) {
                cursor.classList.remove('hover');
            }
        });

        // Filter interactions
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const siblings = Array.from(this.parentElement.querySelectorAll('.filter-btn'));
                const labelBefore = this.previousElementSibling;
                
                if (labelBefore && labelBefore.classList.contains('filter-label')) {
                    // This is the first button after a label, find all related buttons
                    let nextSibling = this.nextElementSibling;
                    const group = [this];
                    
                    while (nextSibling && nextSibling.classList.contains('filter-btn')) {
                        group.push(nextSibling);
                        nextSibling = nextSibling.nextElementSibling;
                    }
                    
                    group.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                }
            });
        });

        // Parallax scrolling
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const orbs = document.querySelectorAll('.floating-orb');
            
            orbs.forEach((orb, index) => {
                const speed = index === 0 ? 0.5 : 0.3;
                orb.style.transform = `translateY(${scrolled * speed}px)`;
            });
        });

        // Update time
        setInterval(() => {
            const updateTime = document.getElementById('updateTime');
            const minutes = Math.floor(Math.random() * 10) + 1;
            updateTime.textContent = `${minutes}m`;
        }, 60000);

        // Keyboard shortcuts (hidden functionality)
        document.addEventListener('keydown', (e) => {
            // Press '/' to focus search
            if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
                e.preventDefault();
                const searchInput = document.getElementById('searchInput');
                searchInput.style.opacity = '1';
                searchInput.style.pointerEvents = 'auto';
                searchInput.focus();
                
                // Create visible search overlay
                if (!document.getElementById('searchOverlay')) {
                    const overlay = document.createElement('div');
                    overlay.id = 'searchOverlay';
                    overlay.style.cssText = `
                        position: fixed;
                        top: 0;
                        left: 0;
                        right: 0;
                        bottom: 0;
                        background: rgba(0, 0, 0, 0.9);
                        backdrop-filter: blur(20px);
                        z-index: 9999;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                    `;
                    
                    const searchBox = document.createElement('div');
                    searchBox.style.cssText = `
                        width: 600px;
                        padding: 32px;
                        background: rgba(20, 20, 20, 0.8);
                        border: 1px solid rgba(123, 97, 255, 0.3);
                        border-radius: 24px;
                    `;
                    
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.placeholder = 'Search templates...';
                    input.style.cssText = `
                        width: 100%;
                        padding: 16px 24px;
                        background: rgba(255, 255, 255, 0.05);
                        border: 1px solid rgba(255, 255, 255, 0.1);
                        border-radius: 100px;
                        color: #fff;
                        font-size: 18px;
                        outline: none;
                    `;
                    
                    searchBox.appendChild(input);
                    overlay.appendChild(searchBox);
                    document.body.appendChild(overlay);
                    
                    input.focus();
                    
                    // Close on escape
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Escape') {
                            overlay.remove();
                        }
                    });
                    
                    // Close on click outside
                    overlay.addEventListener('click', (e) => {
                        if (e.target === overlay) {
                            overlay.remove();
                        }
                    });
                }
            }
            
            // Press 'Escape' to close search
            if (e.key === 'Escape') {
                const overlay = document.getElementById('searchOverlay');
                if (overlay) overlay.remove();
            }
        });

        // Load more functionality (hidden)
        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 100) {
                // Check if load more button exists
                if (!document.getElementById('loadMoreBtn')) {
                    const loadMoreContainer = document.createElement('div');
                    loadMoreContainer.style.cssText = `
                        grid-column: 1 / -1;
                        display: flex;
                        justify-content: center;
                        padding: 40px;
                    `;
                    
                    const loadMoreBtn = document.createElement('button');
                    loadMoreBtn.id = 'loadMoreBtn';
                    loadMoreBtn.textContent = 'Load More';
                    loadMoreBtn.style.cssText = `
                        padding: 12px 32px;
                        background: rgba(255, 255, 255, 0.05);
                        border: 1px solid rgba(255, 255, 255, 0.1);
                        border-radius: 100px;
                        color: #fff;
                        font-size: 14px;
                        cursor: pointer;
                        transition: all 0.3s;
                    `;
                    
                    loadMoreBtn.addEventListener('mouseenter', () => {
                        loadMoreBtn.style.background = 'rgba(123, 97, 255, 0.2)';
                        loadMoreBtn.style.borderColor = 'rgba(123, 97, 255, 0.4)';
                    });
                    
                    loadMoreBtn.addEventListener('mouseleave', () => {
                        loadMoreBtn.style.background = 'rgba(255, 255, 255, 0.05)';
                        loadMoreBtn.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                    });
                    
                    loadMoreBtn.addEventListener('click', () => {
                        loadMoreBtn.textContent = 'Loading...';
                        loadMoreBtn.disabled = true;
                        
                        setTimeout(() => {
                            loadMoreBtn.textContent = 'Load More';
                            loadMoreBtn.disabled = false;
                        }, 1000);
                    });
                    
                    loadMoreContainer.appendChild(loadMoreBtn);
                    document.getElementById('feedGrid').appendChild(loadMoreContainer);
                }
            }
        });

        // Initialize
        renderTemplates();

        // Add button functionality
        document.addEventListener('click', (e) => {
            if (e.target.closest('.view-details-btn')) {
                const templateId = e.target.closest('.template-card').dataset.id;
                const template = templates.find(t => t.id == templateId);
                alert(`View Details for: ${template.title}\n\nDetails coming soon...`);
            }
            
            if (e.target.closest('.copy-winner-btn')) {
                const templateId = e.target.closest('.template-card').dataset.id;
                const template = templates.find(t => t.id == templateId);
                
                // Simulate copying template structure
                const templateData = {
                    title: template.title,
                    platform: template.platformName,
                    successRate: template.sr + '%',
                    format: template.signals.join(', ')
                };
                
                // Copy to clipboard (simulated)
                navigator.clipboard.writeText(JSON.stringify(templateData, null, 2)).then(() => {
                    const btn = e.target.closest('.copy-winner-btn');
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '✅ Copied!';
                    btn.style.background = 'linear-gradient(135deg, #22c55e 0%, #16a34a 100%)';
                    
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.style.background = 'linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%)';
                    }, 2000);
                }).catch(() => {
                    alert(`Template "${template.title}" copied successfully!`);
                });
            }
        });
    </script>
</body>
</html>
