# =============================================================================
# DOCKER COMPOSE - PRODUCTION ENVIRONMENT
# Production-ready deployment with load balancing, SSL, and monitoring
# =============================================================================

version: '3.8'

services:
  # -----------------------------------------------------------------------------
  # Nginx Reverse Proxy & Load Balancer
  # -----------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: trendzo-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/ssl:/etc/ssl/certs:ro
      - nginx-logs:/var/log/nginx
    networks:
      - trendzo-network
      - trendzo-internal
    depends_on:
      - app-1
      - app-2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # -----------------------------------------------------------------------------
  # Application Instances (Load Balanced)
  # -----------------------------------------------------------------------------
  app-1:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: trendzo-app-1-prod
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - INSTANCE_ID=app-1
      - PORT=3000
    env_file:
      - .env.production
    networks:
      - trendzo-internal
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app-2:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: trendzo-app-2-prod
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - INSTANCE_ID=app-2
      - PORT=3000
    env_file:
      - .env.production
    networks:
      - trendzo-internal
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------------------------------------------
  # Redis Cache (Production)
  # -----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: trendzo-redis-prod
    command: redis-server --appendonly yes --maxmemory 1g --maxmemory-policy allkeys-lru --tcp-keepalive 60
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - trendzo-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -----------------------------------------------------------------------------
  # Production Monitoring Stack
  # -----------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: trendzo-prometheus-prod
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - trendzo-internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  grafana:
    image: grafana/grafana:latest
    container_name: trendzo-grafana-prod
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - trendzo-internal
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'

  # -----------------------------------------------------------------------------
  # Log Aggregation
  # -----------------------------------------------------------------------------
  loki:
    image: grafana/loki:latest
    container_name: trendzo-loki-prod
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - trendzo-internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'

  promtail:
    image: grafana/promtail:latest
    container_name: trendzo-promtail-prod
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./docker/promtail/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - trendzo-internal
    depends_on:
      - loki
    restart: unless-stopped

  # -----------------------------------------------------------------------------
  # Application Performance Monitoring
  # -----------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: trendzo-jaeger-prod
    ports:
      - "16686:16686"
      - "14268:14268"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - trendzo-internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  trendzo-network:
    driver: bridge
    name: trendzo-prod-network
  trendzo-internal:
    driver: bridge
    name: trendzo-internal-network
    internal: true

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  redis-data:
    driver: local
    name: trendzo-redis-prod-data
  prometheus-data:
    driver: local
    name: trendzo-prometheus-data
  grafana-data:
    driver: local
    name: trendzo-grafana-data
  loki-data:
    driver: local
    name: trendzo-loki-data
  nginx-logs:
    driver: local
    name: trendzo-nginx-logs