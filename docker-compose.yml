version: '3.8'

services:
  python-services:
    build: ./python-services
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models  # Mount XGBoost model
      - ./uploads:/app/uploads  # Mount upload directory
    environment:
      - CUDA_VISIBLE_DEVICES=-1  # Set to 0 for GPU, -1 for CPU only
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Uncomment below to run Next.js in Docker as well
  # nextjs:
  #   build: .
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - python-services
  #   environment:
  #     - PYTHON_SERVICE_URL=http://python-services:8000

# For development, you can run just the python service:
# docker-compose up python-services
