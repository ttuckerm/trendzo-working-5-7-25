<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ViralLab Score</title>
  <style>body{font-family:Arial;padding:12px}input,button{margin:6px 0;width:100%}</style>
</head>
<body>
  <h3>ViralLab Score</h3>
  <input id="apiKey" placeholder="API Key" />
  <input id="url" placeholder="Video URL (optional)" />
  <textarea id="features" placeholder='{"viewCount":10000}' rows="5"></textarea>
  <button id="run">Score</button>
  <pre id="out"></pre>
  <script>
  document.getElementById('run').onclick = async () => {
    const apiKey = document.getElementById('apiKey').value.trim()
    const url = document.getElementById('url').value.trim()
    let features = {}
    try { features = JSON.parse(document.getElementById('features').value || '{}') } catch {}
    const res = await fetch('/public/score', { method:'POST', headers:{'Content-Type':'application/json','x-api-key':apiKey}, body: JSON.stringify({ url, features }) })
    const data = await res.json()
    document.getElementById('out').textContent = JSON.stringify(data, null, 2)
  }
  </script>
</body>
</html>
