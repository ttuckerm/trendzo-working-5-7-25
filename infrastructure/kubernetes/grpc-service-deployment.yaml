# gRPC Viral Prediction Service Deployment
# Target: ≤100ms inference latency with high availability

apiVersion: apps/v1
kind: Deployment
metadata:
  name: viral-prediction-grpc
  namespace: viral-prediction
  labels:
    app: viral-prediction-grpc
    version: v2.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: viral-prediction-grpc
  template:
    metadata:
      labels:
        app: viral-prediction-grpc
        version: v2.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: viral-prediction-grpc
        image: viral-prediction/grpc-service:latest
        ports:
        - containerPort: 50051
          name: grpc
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        env:
        - name: GRPC_PORT
          value: "50051"
        - name: METRICS_PORT
          value: "9090"
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: viral-prediction-secrets
              key: supabase-url
        - name: SUPABASE_SERVICE_KEY
          valueFrom:
            secretKeyRef:
              name: viral-prediction-secrets
              key: supabase-service-key
        - name: NODE_ENV
          value: "production"
        - name: ENABLE_PERFORMANCE_MONITORING
          value: "true"
        - name: TARGET_LATENCY_MS
          value: "100"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        livenessProbe:
          exec:
            command:
            - grpc_health_probe
            - -addr=:50051
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - grpc_health_probe
            - -addr=:50051
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        # Performance optimizations
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/cache
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir:
          sizeLimit: 1Gi
      # Performance and reliability settings
      priorityClassName: viral-prediction-high
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - viral-prediction-grpc
              topologyKey: kubernetes.io/hostname
      tolerations:
      - key: "high-performance"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: viral-prediction-grpc
  namespace: viral-prediction
  labels:
    app: viral-prediction-grpc
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  type: ClusterIP
  selector:
    app: viral-prediction-grpc
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
---
# Horizontal Pod Autoscaler for load-based scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: viral-prediction-grpc-hpa
  namespace: viral-prediction
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: viral-prediction-grpc
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: grpc_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      selectPolicy: Min
---
# Pod Disruption Budget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: viral-prediction-grpc-pdb
  namespace: viral-prediction
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: viral-prediction-grpc
---
# Service Monitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: viral-prediction-grpc-monitor
  namespace: viral-prediction
  labels:
    app: viral-prediction-grpc
spec:
  selector:
    matchLabels:
      app: viral-prediction-grpc
  endpoints:
  - port: metrics
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s
    honorLabels: true
    metricRelabelings:
    - sourceLabels: [__name__]
      regex: 'grpc_.*'
      targetLabel: service
      replacement: 'viral-prediction-grpc'
---
# ConfigMap for gRPC configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: grpc-config
  namespace: viral-prediction
data:
  server.conf: |
    # gRPC Server Configuration
    max_concurrent_streams: 1000
    keepalive_time_ms: 30000
    keepalive_timeout_ms: 5000
    max_connection_idle_ms: 300000
    max_connection_age_ms: 30000
    max_connection_age_grace_ms: 5000
    
    # Performance Tuning
    target_latency_ms: 100
    enable_performance_monitoring: true
    log_level: info
    
    # Feature Flags
    enable_batch_processing: true
    enable_caching: true
    enable_compression: true