# Kong API Gateway Configuration for Viral Prediction Routes
# Rate limiting and routing rules for ≤100ms latency targets

apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: viral-prediction-rate-limit
  namespace: viral-prediction
plugin: rate-limiting
config:
  minute: 1000      # 1000 requests per minute per consumer
  hour: 10000       # 10000 requests per hour per consumer  
  policy: redis     # Use Redis for distributed rate limiting
  redis_host: redis-cache.viral-prediction.svc.cluster.local
  redis_port: 6379
  fault_tolerant: true
  hide_client_headers: false
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: viral-prediction-response-transformer
  namespace: viral-prediction
plugin: response-transformer
config:
  add:
    headers:
    - "X-API-Version:v2.0"
    - "X-Response-Time:{{upstream_response_time}}ms"
    - "X-Service:viral-prediction"
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: viral-prediction-request-transformer
  namespace: viral-prediction
plugin: request-transformer
config:
  add:
    headers:
    - "X-Request-ID:{{request_id}}"
    - "X-Forwarded-Proto:{{scheme}}"
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: viral-prediction-prometheus
  namespace: viral-prediction
plugin: prometheus
config:
  per_consumer: true
  status_code_metrics: true
  latency_metrics: true
  bandwidth_metrics: true
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: viral-prediction-correlation-id
  namespace: viral-prediction
plugin: correlation-id
config:
  header_name: X-Correlation-ID
  generator: uuid#counter
  echo_downstream: true
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: viral-prediction-timeout
  namespace: viral-prediction
plugin: request-termination
config:
  timeout: 120000  # 120 second timeout for complex ML operations
---
# API Gateway Service Configuration
apiVersion: configuration.konghq.com/v1
kind: KongIngress
metadata:
  name: viral-prediction-api-ingress
  namespace: viral-prediction
upstream:
  algorithm: least-connections
  healthchecks:
    active:
      http_path: "/health"
      healthy:
        interval: 5
        successes: 3
      unhealthy:
        interval: 5
        http_failures: 3
        timeouts: 3
    passive:
      healthy:
        successes: 3
      unhealthy:
        http_failures: 3
proxy:
  connect_timeout: 10000    # 10 seconds
  read_timeout: 100000      # 100 seconds for ML operations
  write_timeout: 100000     # 100 seconds
  retries: 3
---
# Main Viral Prediction API Route
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: viral-prediction-api-ingress
  namespace: viral-prediction
  annotations:
    kubernetes.io/ingress.class: kong
    konghq.com/plugins: viral-prediction-rate-limit,viral-prediction-response-transformer,viral-prediction-request-transformer,viral-prediction-prometheus,viral-prediction-correlation-id
    konghq.com/strip-path: "false"
    konghq.com/preserve-host: "true"
spec:
  rules:
  - host: api.viral-prediction.com
    http:
      paths:
      - path: /api/predict/v2
        pathType: Prefix
        backend:
          service:
            name: viral-prediction-api
            port:
              number: 8080
      - path: /api/predict/legacy
        pathType: Prefix
        backend:
          service:
            name: viral-prediction-legacy
            port:
              number: 8080
      - path: /api/ml
        pathType: Prefix
        backend:
          service:
            name: viral-prediction-ml-api
            port:
              number: 8080
      - path: /api/features
        pathType: Prefix
        backend:
          service:
            name: feast-feature-server
            port:
              number: 6566
---
# Health Check Routes (No Rate Limiting)
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: viral-prediction-health-no-limit
  namespace: viral-prediction
plugin: rate-limiting
config:
  minute: 10000     # Higher limit for health checks
  hour: 100000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: viral-prediction-health-ingress
  namespace: viral-prediction
  annotations:
    kubernetes.io/ingress.class: kong
    konghq.com/plugins: viral-prediction-health-no-limit,viral-prediction-prometheus
    konghq.com/strip-path: "false"
spec:
  rules:
  - host: api.viral-prediction.com
    http:
      paths:
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: viral-prediction-api
            port:
              number: 8080
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: viral-prediction-api
            port:
              number: 8080
---
# Consumer for API Key Authentication
apiVersion: configuration.konghq.com/v1
kind: KongConsumer
metadata:
  name: viral-prediction-client
  namespace: viral-prediction
  annotations:
    kubernetes.io/ingress.class: kong
username: viral-prediction-client
custom_id: "viral-prediction-client-001"
---
# API Key for Consumer
apiVersion: configuration.konghq.com/v1
kind: KongCredential
metadata:
  name: viral-prediction-api-key
  namespace: viral-prediction
consumerRef: viral-prediction-client
type: key-auth
config:
  key: "vp-api-key-unicorn-grade-2025"
---
# Key Authentication Plugin
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: viral-prediction-key-auth
  namespace: viral-prediction
plugin: key-auth
config:
  key_names:
  - "X-API-Key"
  - "apikey"
  key_in_header: true
  key_in_query: false
  hide_credentials: true
---
# Apply Authentication to Main API
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: viral-prediction-secure-api
  namespace: viral-prediction
  annotations:
    kubernetes.io/ingress.class: kong
    konghq.com/plugins: viral-prediction-key-auth,viral-prediction-rate-limit,viral-prediction-response-transformer,viral-prediction-prometheus
spec:
  rules:
  - host: secure-api.viral-prediction.com
    http:
      paths:
      - path: /api/predict/v2
        pathType: Prefix
        backend:
          service:
            name: viral-prediction-api
            port:
              number: 8080