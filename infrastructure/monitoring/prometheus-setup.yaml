# Prometheus Monitoring Stack for Viral Prediction Platform
# Target: 99.95% uptime monitoring, ≤100ms latency tracking

apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
- apiGroups: [""]
  resources:
  - nodes
  - nodes/proxy
  - services
  - endpoints
  - pods
  verbs: ["get", "list", "watch"]
- apiGroups:
  - extensions
  resources:
  - ingresses
  verbs: ["get", "list", "watch"]
- nonResourceURLs: ["/metrics"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'viral-prediction-cluster'
        environment: 'production'

    rule_files:
      - "/etc/prometheus/rules/*.yml"

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager:9093

    scrape_configs:
      # Kubernetes API Server
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
        - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
        - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
          action: keep
          regex: default;kubernetes;https

      # Kubernetes Nodes
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
        - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)

      # Kubernetes Pods
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
        - role: pod
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_pod_name]
          action: replace
          target_label: kubernetes_pod_name

      # Viral Prediction API Metrics
      - job_name: 'viral-prediction-api'
        static_configs:
        - targets: ['viral-prediction-api.viral-prediction.svc.cluster.local:8080']
        metrics_path: '/metrics'
        scrape_interval: 5s  # High frequency for latency monitoring

      # Kong Gateway Metrics
      - job_name: 'kong-gateway'
        static_configs:
        - targets: ['kong-proxy.kong.svc.cluster.local:8100']
        metrics_path: '/metrics'
        scrape_interval: 10s

      # Istio Metrics
      - job_name: 'istio-mesh'
        kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            names:
            - istio-system
        relabel_configs:
        - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
          action: keep
          regex: istio-telemetry;prometheus

      # ML Pipeline Metrics (MLflow)
      - job_name: 'mlflow-tracking'
        static_configs:
        - targets: ['mlflow-tracking.viral-prediction-ml.svc.cluster.local:5000']
        metrics_path: '/metrics'
        scrape_interval: 30s

      # Feature Store Metrics (Feast)
      - job_name: 'feast-serving'
        static_configs:
        - targets: ['feast-feature-server.viral-prediction.svc.cluster.local:6566']
        metrics_path: '/metrics'
        scrape_interval: 15s

  # Alert Rules for SLA Monitoring
  alert_rules.yml: |
    groups:
    - name: viral_prediction_sla
      rules:
      # 99.95% Uptime (≤26.3 minutes downtime per month)
      - alert: HighErrorRate
        expr: (rate(http_requests_total{job="viral-prediction-api",code=~"5.."}[5m]) / rate(http_requests_total{job="viral-prediction-api"}[5m])) * 100 > 0.05
        for: 1m
        labels:
          severity: critical
          service: viral-prediction-api
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }}% which exceeds 0.05% threshold for 99.95% uptime SLA"

      # ≤100ms Latency Target
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="viral-prediction-api"}[5m])) * 1000 > 100
        for: 2m
        labels:
          severity: critical
          service: viral-prediction-api
        annotations:
          summary: "High latency detected"
          description: "95th percentile latency is {{ $value }}ms which exceeds 100ms target"

      # Service Availability
      - alert: ServiceDown
        expr: up{job="viral-prediction-api"} == 0
        for: 30s
        labels:
          severity: critical
          service: viral-prediction-api
        annotations:
          summary: "Viral prediction API is down"
          description: "Viral prediction API has been down for more than 30 seconds"

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes{pod=~"viral-prediction-api.*"} / container_spec_memory_limit_bytes{pod=~"viral-prediction-api.*"}) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: viral-prediction-api
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}% which exceeds 80% threshold"

      # High CPU Usage
      - alert: HighCPUUsage
        expr: (rate(container_cpu_usage_seconds_total{pod=~"viral-prediction-api.*"}[5m]) / container_spec_cpu_quota{pod=~"viral-prediction-api.*"}) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: viral-prediction-api
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}% which exceeds 80% threshold"

      # ML Model Accuracy Degradation
      - alert: AccuracyDegradation
        expr: viral_prediction_accuracy < 95
        for: 10m
        labels:
          severity: critical
          service: viral-prediction-ml
        annotations:
          summary: "Model accuracy below target"
          description: "Model accuracy is {{ $value }}% which is below 95% target"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:v2.40.0
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus/'
          - '--web.console.libraries=/etc/prometheus/console_libraries'
          - '--web.console.templates=/etc/prometheus/consoles'
          - '--storage.tsdb.retention.time=30d'
          - '--web.enable-lifecycle'
          - '--storage.tsdb.retention.size=10GB'
          - '--query.max-concurrency=50'
        ports:
        - containerPort: 9090
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        volumeMounts:
        - name: prometheus-config-volume
          mountPath: /etc/prometheus/
        - name: prometheus-storage-volume
          mountPath: /prometheus/
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: prometheus-config-volume
        configMap:
          defaultMode: 420
          name: prometheus-config
      - name: prometheus-storage-volume
        persistentVolumeClaim:
          claimName: prometheus-storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-storage
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  selector:
    app: prometheus
  type: ClusterIP
  ports:
  - port: 9090
    targetPort: 9090