# =============================================================================
# KUBERNETES SECRETS TEMPLATE
# IMPORTANT: Fill in actual values and apply using 'kubectl apply -f'
# DO NOT commit this file with real secrets to version control
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: trendzo-secrets
  namespace: trendzo-production
  labels:
    app: trendzo-app
    environment: production
type: Opaque
data:
  # =============================================================================
  # IMPORTANT: All values must be base64 encoded
  # Use: echo -n "your_secret_value" | base64
  # =============================================================================
  
  # Application URL
  NEXT_PUBLIC_APP_URL: eW91cmRvbWFpbi5jb20=  # Replace with: echo -n "https://yourdomain.com" | base64
  
  # Admin email
  NEXT_PUBLIC_ADMIN_EMAIL: YWRtaW5AeW91cmRvbWFpbi5jb20=  # Replace with: echo -n "admin@yourdomain.com" | base64
  
  # Database credentials
  NEXT_PUBLIC_SUPABASE_URL: aHR0cHM6Ly95b3VyLXByb2plY3Quc3VwYWJhc2UuY28=  # Replace with your Supabase URL
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eW91cl9zdXBhYmFzZV9hbm9uX2tleQ==  # Replace with your Supabase anon key
  SUPABASE_SERVICE_KEY: eW91cl9zdXBhYmFzZV9zZXJ2aWNlX2tleQ==  # Replace with your Supabase service key
  
  # Authentication
  NEXTAUTH_SECRET: eW91cl9uZXh0YXV0aF9zZWNyZXRfYXRfbGVhc3RfMzJfY2hhcnM=  # Replace with secure 32+ char secret
  NEXTAUTH_URL: aHR0cHM6Ly95b3VyZG9tYWluLmNvbQ==  # Replace with your domain
  
  # Google OAuth (optional)
  GOOGLE_CLIENT_ID: eW91cl9nb29nbGVfY2xpZW50X2lk  # Replace with Google OAuth client ID
  GOOGLE_CLIENT_SECRET: eW91cl9nb29nbGVfY2xpZW50X3NlY3JldA==  # Replace with Google OAuth client secret
  
  # AI Services
  OPENAI_API_KEY: c2steW91cl9vcGVuYWlfYXBpX2tleQ==  # Replace with OpenAI API key
  ANTHROPIC_API_KEY: c2stYW50LXlvdXJfYW50aHJvcGljX2FwaV9rZXk=  # Replace with Anthropic API key
  HUGGING_FACE_API_KEY: aGZfeW91cl9odWdnaW5nX2ZhY2VfdG9rZW4=  # Replace with Hugging Face token
  
  # Data scraping
  APIFY_API_TOKEN: YXBpZnlfYXBpX3lvdXJfdG9rZW4=  # Replace with Apify API token
  
  # Video processing (optional)
  REMOTION_LAMBDA_REGION: dXMtZWFzdC0x  # Replace with AWS region
  SHOTSTACK_API_KEY: eW91cl9zaG90c3RhY2tfYXBpX2tleQ==  # Replace with Shotstack API key
  
  # Redis (if using external Redis)
  REDIS_URL: cmVkaXM6Ly9sb2NhbGhvc3Q6NjM3OQ==  # Replace with Redis URL
  REDIS_PASSWORD: eW91cl9yZWRpc19wYXNzd29yZA==  # Replace with Redis password
  
  # Monitoring
  GRAFANA_ADMIN_PASSWORD: c2VjdXJlX2FkbWluX3Bhc3N3b3JkX2NoYW5nZV90aGlz  # Replace with secure Grafana password
  
  # External service monitoring
  METRICS_API_BASE: aHR0cHM6Ly9hcGkueW91cmRvbWFpbi5jb20vbWV0cmljcw==  # Replace with metrics API URL

---
# =============================================================================
# DOCKER REGISTRY SECRET (if using private registry)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-secret
  namespace: trendzo-production
  labels:
    app: trendzo-app
    environment: production
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: ewogICJhdXRocyI6IHsKICAgICJyZWdpc3RyeS5leGFtcGxlLmNvbSI6IHsKICAgICAgInVzZXJuYW1lIjogInVzZXJuYW1lIiwKICAgICAgInBhc3N3b3JkIjogInBhc3N3b3JkIiwKICAgICAgImVtYWlsIjogImVtYWlsQGV4YW1wbGUuY29tIiwKICAgICAgImF1dGgiOiAiZFhObGNtNWhiV1U2Y0dGemMzZHZjbVE9IgogICAgfQogIH0KfQ==

---
# =============================================================================
# TLS SECRET (will be automatically managed by cert-manager)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: trendzo-tls-secret
  namespace: trendzo-production
  labels:
    app: trendzo-app
    environment: production
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
type: kubernetes.io/tls
# Note: cert-manager will automatically populate tls.crt and tls.key

---
# =============================================================================
# INSTRUCTIONS FOR DEPLOYMENT
# =============================================================================
# 
# 1. Copy this file to secrets.yaml
# 2. Replace all base64 encoded values with your actual secrets:
#    echo -n "your_actual_secret" | base64
# 3. Apply the secrets: kubectl apply -f secrets.yaml
# 4. Verify secrets: kubectl get secrets -n trendzo-production
# 5. Delete the secrets.yaml file after applying (for security)
#
# Security best practices:
# - Use strong, unique passwords for all services
# - Rotate secrets regularly
# - Use tools like sealed-secrets or external-secrets for GitOps
# - Enable RBAC to restrict secret access
# - Monitor secret access with audit logs
#
# To decode a secret for debugging:
# kubectl get secret trendzo-secrets -n trendzo-production -o jsonpath='{.data.OPENAI_API_KEY}' | base64 -d
#
# =============================================================================